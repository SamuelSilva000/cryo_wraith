="produtos.html">Calçados</a><a href="carrinho.html">Sacola</a><a href="#" id="pf" class="bp" style="display:none">Perfil</a><button id="lg">Entrar</button></div></nav><section class="ad"><h1 class="tt">Painel Administrativo <button class="lo" id="lo">Sair</button></h1><div class="tb"><button class="on" data-t="p">Produtos</button><button data-t="u">Usuários</button><button data-t="o">Pedidos</button></div><div id="tP" class="tp on"><div id="lP"></div><button class="ab a" id="aP">+ Adicionar Calçado</button></div><div id="tU" class="tp"><div id="lU"></div></div><div id="tO" class="tp"><div id="lO"></div></div></section><footer><p>CRYO WRAITH © 2026</p><p><a href="contato.html">Sobre</a> | <a href="contato.html">Entregas</a> | <a href="contato.html">Trocas</a> | <a href="contato.html">Contato</a></p></footer><div id="md" class="md"><div class="mc"><span class="cl">&times;</span><h3>Acessar</h3><div class="tb2"><button class="on" data-t="l">Login</button><button data-t="r">Registro</button></div><div id="pL" class="tp2 on"><input id="lE" placeholder="Email"><input id="lS" type="password" placeholder="Senha"><button id="mL">Entrar</button><button id="mA" style="background:#F3F4F6;color:#1F2937;border:1px solid #D1D5DB">Admin</button><a href="#" id="fe" style="display:block;text-align:center;margin-top:8px;color:#4B5563;font-size:0.8rem">Esqueceu a senha?</a></div><div id="pR" class="tp2"><input id="rN" placeholder="Nome"><input id="rE" placeholder="Email"><input id="rS" type="password" placeholder="Senha"><input id="rC" type="password" placeholder="Confirmar"><button id="mR">Criar Conta</button></div><div style="margin-top:10px;text-align:center;font-size:0.75rem;color:#6B7280">admin@cryowraith.com / 123456</div></div></div><div id="fM" class="pm"><div class="pmc"><p id="fMp"></p><input id="fMi" placeholder="Digite seu e-mail" style="display:none"><button id="fMb"></button><button id="fMc" style="background:#F3F4F6;color:#1F2937;border:1px solid #D1D5DB">Fechar</button></div></div><div id="am" class="pm"><div class="pmc"><p id="amp"></p><div id="amin" style="display:none"><input id="ami" placeholder=""></div><button id="amb">OK</button><button id="amc" style="background:#F3F4F6;color:#1F2937;border:1px solid #D1D5DB;display:none">Cancelar</button></div></div><div id="pdm" class="pm"><div class="pmc"><span class="cl" id="pdmClose">&times;</span><h3>➕ Novo Calçado</h3><input id="pdNome" placeholder="Nome *"><input id="pdPreco" placeholder="Preço (R$ *)" type="number" step="0.01"><input id="pdDesc" placeholder="Descrição"><input id="pdImg" placeholder="Imagem (ex: calcado1.jpg)" value="calcado1.jpg"><input id="pdEstoque" placeholder="Estoque *" type="number"><input id="pdTipo" placeholder="Tipo (ex: Tênis)"><button id="pdSalvar">Salvar</button><button id="pdCancelar">Cancelar</button></div></div><script>(function(){if(localStorage.getItem('userRoleFaux')!=='admin')location.href='index.html';let P={};function carregarProdutos(){let s=localStorage.getItem('produtosEstoqueFaux');if(s){P=JSON.parse(s);}else{P={"Tênis Casual":{total:45,desc:"Visual minimalista · solado baixo · casual",preco:199.9,tipo:"Tênis",img:"imagens/calcado1.jpg",destaque:true},"Chinelo Slide":{total:60,desc:"Tira única larga · aberto · confortável",preco:89.9,tipo:"Chinelos",img:"imagens/calcado2.jpg",destaque:true},"Bota Chelsea":{total:20,desc:"Cano curto · elástico lateral · urbano",preco:249.9,tipo:"Botas",img:"imagens/calcado3.jpg",destaque:true},"Tênis Slip-On":{total:35,desc:"Sem cadarço · puxador traseiro · casual",preco:179.9,tipo:"Tênis",img:"imagens/calcado4.jpg",destaque:true},"Mocassim Loafer":{total:25,desc:"Sem cadarço · costura aparente · social-casual",preco:229.9,tipo:"Mocassins",img:"imagens/calcado5.jpg",destaque:true},"Alpargata Listrada":{total:30,desc:"Solado de corda · tecido · estilo verão",preco:159.9,tipo:"Alpargatas",img:"imagens/calcado6.jpg",destaque:true},"Sandália Salto Médio":{total:20,desc:"Várias tiras · fivela · salto bloco",preco:189.9,tipo:"Sandálias",img:"imagens/calcado7.jpg",destaque:true},"Bota Cano Médio":{total:15,desc:"Solado grosso · puxador atrás · robusta",preco:299.9,tipo:"Botas",img:"imagens/calcado8.jpg",destaque:true}};localStorage.setItem('produtosEstoqueFaux',JSON.stringify(P));}}function salvarProdutos(){localStorage.setItem('produtosEstoqueFaux',JSON.stringify(P));}function rP(){let d=document.getElementById('lP'),ks=Object.keys(P);if(!ks.length){d.innerHTML='<div class="vz">Nenhum calçado cadastrado</div>';return;}d.innerHTML=ks.map(k=>{let kEsc=k.replace(/'/g,"\\'");return`<div class="ai"><div class="hd"><div><strong>${k}</strong><div class="inf">R$ ${P[k].preco.toFixed(2)} | ${P[k].total} unidades</div><div class="inf">${P[k].desc||''}</div></div><div class="acts"><button class="ab" onclick="eP('${kEsc}')">Editar</button><button class="ab r" onclick="rmP('${kEsc}')">Remover</button></div></div></div>`;}).join('');}window.eP=k=>{let p=P[k],np=parseFloat(prompt('Novo preço:',p.preco)),ne=parseInt(prompt('Novo estoque (unidades):',p.total));if(!isNaN(np))P[k].preco=np;if(!isNaN(ne))P[k].total=ne;salvarProdutos();rP();};window.rmP=k=>{showConfirm('Remover '+k+'?',()=>{delete P[k];salvarProdutos();rP();});};const rU=()=>{let d=document.getElementById('lU'),us=JSON.parse(localStorage.getItem('usersFaux')||'[]');if(!us.length){d.innerHTML='<div class="vz">Nenhum usuário</div>';return;}d.innerHTML=us.map((u,i)=>`<div class="ai"><div class="hd"><div><strong>${u.nome}</strong><div class="inf">${u.email}</div></div><button class="ab r" onclick="rmU(${i})">Remover</button></div></div>`).join('');};window.rmU=i=>{let us=JSON.parse(localStorage.getItem('usersFaux')||'[]');showConfirm('Remover '+us[i].email+'?',()=>{us.splice(i,1);localStorage.setItem('usersFaux',JSON.stringify(us));rU();});};const rO=()=>{let d=document.getElementById('lO'),ps=JSON.parse(localStorage.getItem('pedidosFaux')||'[]');if(!ps.length){d.innerHTML='<div class="vz">Nenhum pedido</div>';return;}d.innerHTML= button'),pL=document.getElementById('pL'),pR=document.getElementById('pR');tbs.forEach(b=>b.onclick=()=>{tbs.forEach(x=>x.classList.remove('on'));b.classList.add('on');pL.classList.remove('on');pR.classList.remove('on');(b.dataset.t==='l'?pL:pR).classList.add('on');});cs.onclick=()=>md.style.display='none';md.onclick=e=>{if(e.target===md)md.style.display='none';};function su(em,ro){localStorage.setItem('userEmailFaux',em);localStorage.setItem('userRoleFaux',ro);md.style.display='none';uN();showAlert(ro==='admin'?'Login como administrador realizado com sucesso!':'Login realizado com sucesso!');}document.getElementById('mL').onclick=()=>{let em=document.getElementById('lE').value.trim(),s=document.getElementById('lS').value;if(em&&s){let u=JSON.parse(localStorage.getItem('usersFaux')||'[]').find(u=>u.email===em&&u.senha===s);u?su(em,'user'):showAlert('Email/senha inválidos!');}else showAlert('Preencha todos os campos!');};document.getElementById('mA').onclick=()=>{let em=document.getElementById('lE').value.trim(),s=document.getElementById('lS').value;em==='admin@cryowraith.com'&&s==='123456'?su(em,'admin'):showAlert('Admin inválido!');};document.getElementById('mR').onclick=()=>{let n=document.getElementById('rN').value.trim(),em=document.getElementById('rE').value.trim(),s=document.getElementById('rS').value,c=document.getElementById('rC').value;if(!n||!em||!s||!c)return showAlert('Preencha todos os campos!');if(s!==c)return showAlert('Senhas não conferem!');let us=JSON.parse(localStorage.getItem('usersFaux')||'[]');if(us.find(u=>u.email===em))return showAlert('Email já cadastrado!');us.push({nome:n,email:em,senha:s});localStorage.setItem('usersFaux',JSON.stringify(us));tbs[0].click();document.getElementById('lE').value=em;document.getElementById('lS').value=s;showAlert('Conta criada com sucesso!');document.getElementById('mL').click();};document.getElementById('fe').onclick=e=>{e.preventDefault();let fM=document.getElementById('fM'),fMi=document.getElementById('fMi'),fMp=document.getElementById('fMp'),fMb=document.getElementById('fMb');fM.style.display='flex';fMi.style.display='block';fMp.textContent='Digite seu e-mail para recuperar a senha:';fMb.textContent='Recuperar';fMb.onclick=()=>{let em=fMi.value.trim();if(!em)return showAlert('Digite um e-mail!');let us=JSON.parse(localStorage.getItem('usersFaux')||'[]'),u=us.find(u=>u.email===em);if(u){showAlert('Sua senha: '+u.senha);fM.style.display='none';fMi.value='';}else{showAlert('E-mail não encontrado!');}};};let am=document.getElementById('am'),amp=document.getElementById('amp'),amb=document.getElementById('amb'),amc=document.getElementById('amc'),amin=document.getElementById('amin'),ami=document.getElementById('ami');window.showAlert=(msg,cb)=>{am.style.display='flex';amp.textContent=msg;amin.style.display='none';amb.style.display='inline-block';amc.style.display='none';amb.onclick=()=>{am.style.display='none';if(cb)cb();};};window.showConfirm=(msg,cb)=>{am.style.display='flex';amp.textContent=msg;amin.style.display='none';amb.style.display='inline-block';amc.style.display='inline-block';amb.textContent='Sim';amc.textContent='Não';amb.onclick=()=>{am.style.display='none';if(cb)cb();};amc.onclick=()=>{am.style.display='none';};};document.getElementById('fMc').onclick=()=>{document.getElementById('fM').style.display='none';};document.getElementById('fM').onclick=e=>{if(e.target===document.getElementById('fM'))document.getElementById('fM').style.display='none';};am.onclick=e=>{if(e.target===am)am.style.display='none';};const pdm=document.getElementById('pdm'),pdmClose=document.getElementById('pdmClose'),pdSalvar=document.getElementById('pdSalvar'),pdCancelar=document.getElementById('pdCancelar');function limparCamposProduto(){document.getElementById('pdNome').value='';document.getElementById('pdPreco').value='';document.getElementById('pdDesc').value='';document.getElementById('pdImg').value='calcado1.jpg';document.getElementById('pdEstoque').value='';document.getElementById('
