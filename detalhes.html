age.getItem('produtoDetalheFaux');if(!d){document.getElementById('pN').innerText='Produto não encontrado';return;}pa=JSON.parse(d);let st=PE[pa.nome]?.total||0;document.getElementById('pI').src=pa.img;document.getElementById('pN').innerText=pa.nome;document.getElementById('pD').innerText=pa.desc;document.getElementById('pP').innerText='R$ '+parseFloat(pa.preco).toFixed(2);document.getElementById('pS').innerHTML=st+' unidades disponíveis';let tams=['37','38','39','40','41','42','43'];document.getElementById('tO').innerHTML=tams.map((t,i)=>`<div class="tsz" data-t="${t}" id="ts${i}">${t}</div>`).join('');document.querySelectorAll('.tsz').forEach(b=>b.onclick=function(){document.querySelectorAll('.tsz').forEach(x=>x.classList.remove('on'));this.classList.add('on');tam=this.dataset.t;document.getElementById('tamSel').value=tam;});}function adc(red){if(!pa){showAlert('Produto não encontrado');return;}if(!tam){showAlert('Selecione um tamanho');return;}let q=parseInt(document.getElementById('qI').value);if(isNaN(q)||q<1){showAlert('Quantidade inválida');return;}let st=PE[pa.nome]?.total||0;if(q>st){showAlert('Estoque insuficiente! Disponível: '+st);return;}let c=JSON.parse(localStorage.getItem('carrinhoFaux')||'[]'),ni=pa.nome+' (Tam '+tam+')',ex=c.find(i=>i.nome===ni);ex?ex.qtd+=q:c.push({nome:ni,preco:parseFloat(pa.preco),qtd:q,img:pa.img,tamanho:tam});localStorage.setItem('carrinhoFaux',JSON.stringify(c));showConfirm(q+'x '+pa.nome+' (Tam '+tam+') adicionado! Ir para a sacola?',()=>{location.href='carrinho.html';if(red)location.href='checkout.html';});}function uN(){let e=localStorage.getItem('userEmailFaux'),r=localStorage.getItem('userRoleFaux'),lb=document.getElementById('lg'),pb=document.getElementById('pf');if(e){lb.style.display='none';pb.style.display='inline-block';pb.onclick=()=>location.href=r==='admin'?'admin.html':'perfil.html';}else{lb.style.display='inline-block';lb.onclick=()=>document.getElementById('md').style.display='flex';pb.style.display='none';}}in
